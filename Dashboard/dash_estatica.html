<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTrak-dash_estatica</title>
    <link rel="stylesheet" href="./assets/css/dash_estatica.css">
    <script src="path/to/chartjs/dist/chart.umd.min.js"></script>
    <script src="./assets/js/dash.js"></script>
</head>

<body>
    <div class="container-geral">
        <div class="container-geral-titulo">
            <h1>Fluxo de Clientes: Pessoas ao longo do dia</h1>

        </div>
        <div class="content-geral">
            <div class="content-geral-left">
                <div class="geral-kpis">
                    <div class="box-kpis">
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                    </div>
                    <div class="box-kpis">
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                    </div>
                    <div class="box-kpis">
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                        <div class="box-kpis-row"></div>
                    </div>
                </div>
                <div class="geral-left-grafico">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
            <div class="content-geral-right">
                <div class="geral-right-titulo">
                    <h1>Mapa de calor: areas de maior movimento NO DIA</h1>
                </div>
                <div class="geral-right-grafico">
                    <canvas id="myChart2"></canvas>
                </div>
            </div>
        </div>
    </div>
</body>


</html>
<script>
      const ctx = document.getElementById('myChart');

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
      datasets: [{
        label: '# of Votes',
        data: [12, 19, 3, 5, 2, 3],
        borderWidth: 1
      }]
      
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });


    const ctx2 = document.getElementById('myChart2');
    
  new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
      datasets: [{
        label: '# of Votes',
        data: [12, 19, 3, 5, 2, 3],
        borderWidth: 1
      }]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>
